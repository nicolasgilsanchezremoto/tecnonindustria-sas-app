<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoIndustria - Panel de Control Físico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="header-content">
            <i class="fas fa-industry logo-icon"></i>
            <div>
                <h1>PhysicTech Pro</h1>
                <p>Solución de Optimización para TecnoIndustria S.A.S. [SENA]</p>
            </div>
        </div>
    </header>

    <main class="dashboard">
        <div class="card">
            <div class="card-icon"><i class="fas fa-thermometer-half"></i></div>
            <h3>Calor y Temperatura</h3>
            <div class="input-group">
                <label>Convertir °C a °F y K:</label>
                <input type="number" id="tempC" placeholder="Celsius (°C)" oninput="convertTemp()">
                <p id="resTemp" class="result">F: - | K: -</p>
            </div>
            <div class="input-group">
                <label>Calor ($Q = m \cdot c \cdot \Delta T$):</label>
                <input type="number" id="massQ" placeholder="Masa (kg)">
                <input type="number" id="deltaT" placeholder="Var. Temp (ΔT)">
                <button onclick="calcCalor()">Calcular Joules</button>
                <p id="resCalor" class="result"></p>
            </div>
        </div>

        <div class="card">
            <div class="card-icon"><i class="fas fa-tint"></i></div>
            <h3>Presión y Caudales</h3>
            <div class="input-group">
                <label>Presión ($P = F / A$):</label>
                <input type="number" id="force" placeholder="Fuerza (N)">
                <input type="number" id="area" placeholder="Área (m²)">
                <button onclick="calcPresion()">Calcular Pa</button>
                <p id="resPresion" class="result"></p>
            </div>
            <div class="input-group">
                <label>Caudal ($Q = A \cdot v$):</label>
                <input type="number" id="areaQ" placeholder="Área (m²)">
                <input type="number" id="vel" placeholder="Velocidad (m/s)">
                <button onclick="calcCaudal()">Calcular m³/s</button>
                <p id="resCaudal" class="result"></p>
            </div>
        </div>

        <div class="card">
            <div class="card-icon"><i class="fas fa-bolt"></i></div>
            <h3>Energía y Eficiencia</h3>
            <div class="input-group">
                <label>Energía Potencial ($Ep = m \cdot g \cdot h$):</label>
                <input type="number" id="massEp" placeholder="Masa (kg)">
                <input type="number" id="height" placeholder="Altura (m)">
                <button onclick="calcEnergia()">Calcular Ep</button>
                <p id="resEnergia" class="result"></p>
            </div>
            <div class="input-group">
                <label>Eficiencia Energetica (%):</label>
                <input type="number" id="eUtil" placeholder="E. Útil">
                <input type="number" id="eTotal" placeholder="E. Total">
                <button onclick="calcEficiencia()">Calcular %</button>
                <p id="resEficiencia" class="result"></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Proyecto ADSO - Aprendices SENA en rol de Ingenieros [cite: 13]</p>
    </footer>

    <script>
        function convertTemp() {
            const c = parseFloat(document.getElementById('tempC').value);
            if (!isNaN(c)) {
                const f = (c * 1.8) + 32;
                const k = c + 273.15;
                document.getElementById('resTemp').innerText = `F: ${f.toFixed(2)} | K: ${k.toFixed(2)}`;
            }
        }

        function calcCalor() {
            const m = document.getElementById('massQ').value;
            const dt = document.getElementById('deltaT').value;
            const cEspecífico = 4186; // Agua por defecto
            const q = m * cEspecífico * dt;
            document.getElementById('resCalor').innerText = `Calor Q: ${q.toLocaleString()} J`;
        }

        function calcPresion() {
            const f = document.getElementById('force').value;
            const a = document.getElementById('area').value;
            if(a > 0) document.getElementById('resPresion').innerText = `Presión: ${(f/a).toFixed(2)} Pa`;
        }

        function calcCaudal() {
            const a = document.getElementById('areaQ').value;
            const v = document.getElementById('vel').value;
            document.getElementById('resCaudal').innerText = `Caudal: ${(a*v).toFixed(2)} m³/s`;
        }

        function calcEnergia() {
            const m = document.getElementById('massEp').value;
            const h = document.getElementById('height').value;
            const ep = m * 9.81 * h;
            document.getElementById('resEnergia').innerText = `Ep: ${ep.toFixed(2)} J`;
        }

        function calcEficiencia() {
            const u = document.getElementById('eUtil').value;
            const t = document.getElementById('eTotal').value;
            if(t > 0) document.getElementById('resEficiencia').innerText = `Eficiencia: ${((u/t)*100).toFixed(2)}%`;
        }
    </script>
</body>
</html>
